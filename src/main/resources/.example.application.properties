spring.application.name=TestProject

# ===========================================
# 환경변수 설정 가이드
# ===========================================
# 아래 값들을 production.application.properties 또는 시스템 환경변수로 설정하세요.
# production.application.properties 파일을 src/main/resources/ 에 생성하면
# @PropertySource에 의해 자동 로딩됩니다.
# ===========================================

# Database Configuration
jdbc.driver=com.microsoft.sqlserver.jdbc.SQLServerDriver
jdbc.url=jdbc:sqlserver://[DB_HOST]:[DB_PORT];DatabaseName=[DB_NAME];trustServerCertificate=true;
jdbc.username=[DB_USERNAME]
jdbc.password=[DB_PASSWORD]

# Database Connection Pool
jdbc.maxTotal=20
jdbc.maxIdle=10
jdbc.minIdle=5
jdbc.initialSize=5

# MyBatis Configuration
mybatis.config-location=classpath:sql-map-config.xml
mybatis.mapper-locations=classpath:mappings/**/*-mapping.xml

# Redis Configuration
redis.host=[REDIS_HOST]
redis.port=[REDIS_PORT]
redis.password=[REDIS_PASSWORD]
redis.timeout=2000
redis.pool.maxTotal=20
redis.pool.maxIdle=10
redis.pool.minIdle=5

# Mail Configuration
mail.host=[MAIL_HOST]
mail.port=[MAIL_PORT]
mail.username=[MAIL_USERNAME]
mail.password=[MAIL_PASSWORD]
mail.defaultEncoding=utf-8
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.smtp.ssl.enable=true
mail.smtp.ssl.trust=*
mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

# Server Configuration
server.port=8088

# Session TimeOut Configuration
server.servlet.session.timeout=21600

# JSP Configuration for Spring Boot
spring.mvc.view.prefix=/WEB-INF/
spring.mvc.view.suffix=.jsp

# Gson Configuration
spring.mvc.converters.preferred-json-mapper=gson

# Work24 Open API Configuration
work24.api.key=[WORK24_API_KEY]

# Gemini API Configuration
gemini.api.key=[GEMINI_API_KEY]
gemini.api.model=[GEMINI_MODEL_NAME]

# Gemini Recommend Configuration
gemini.recommend.max-candidates=20

# Kakao API Configuration
kakao.javascript-key=[KAKAO_JAVASCRIPT_KEY]